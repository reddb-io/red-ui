name: Changesets

# Single-owner npm release, no PAT and no GitHub App — just the session
# GITHUB_TOKEN (for git/PR ops) + NPM_TOKEN (for the registry).
#
# On every push to main, changesets/action either:
#   - opens/updates a "Version Packages" PR (when changeset files are pending)
#     that runs `pnpm release:version` — bumps the fixed group
#     (@reddb-io/ui + ui-kit + ui-mcp) and syncs the desktop/Tauri version; or
#   - once that PR is merged (all changesets consumed), runs `pnpm release:publish`
#     (`changeset publish`) **in this same run** to publish to npm.
#
# Because publishing happens inside this workflow (not via a tag that a second
# workflow listens for), the GITHUB_TOKEN is enough — there is no cross-workflow
# trigger to defeat GitHub's anti-recursion rule. No PAT, no App.
#
# Runs on a github-hosted runner because npm provenance only verifies there
# (a Blacksmith/self-hosted runner fails publish with E422). The job is light.
#
# Desktop/PWA binaries live in release.yml, triggered by a manually-pushed v*
# tag when you want a binary release.

on:
  push:
    branches:
      - main

concurrency:
  group: changesets-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  changesets:
    name: Version / publish packages
    runs-on: ubuntu-latest
    # Skip the bot's own version-bump commit to avoid a loop.
    if: ${{ !endsWith(github.actor, '[bot]') }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Version PR, or publish to npm on merge
        uses: changesets/action@v1
        with:
          # pending changesets → "Version Packages" PR; none → run publish.
          version: pnpm release:version
          publish: pnpm release:publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          # Per-package git tags from `changeset publish` are enough; no GH
          # release here (release.yml owns binaries on a manual v* tag).
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
