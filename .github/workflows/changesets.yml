name: Changesets

# Token-only release — no PAT, no GitHub App. The reddb-io org forbids GitHub
# Actions from creating PRs, so the usual changesets "Version Packages" PR flow
# can't run on GITHUB_TOKEN. Instead this is PR-LESS: on push to main, if there
# are pending changeset files, we version + commit the bump straight to main
# (main is unprotected) and publish to npm — all in one run.
#
#   land changeset files on main → this workflow bumps the fixed group
#   (@reddb-io/ui + ui-kit + ui-mcp), commits "chore(release): version packages",
#   pushes it to main, and runs `changeset publish`.
#
# Auth: GITHUB_TOKEN (contents:write to push the bump) + NPM_TOKEN (registry).
# Runs github-hosted because npm provenance only verifies there. The bot's own
# bump commit is skipped by the actor guard, so it never loops.
#
# Trade-off: no human review gate on the version bump (it auto-ships when a
# changeset reaches main). To get the PR gate back, an org owner must allow
# "GitHub Actions to create and approve pull requests" — then switch back to the
# changesets/action PR flow.

on:
  push:
    branches:
      - main

concurrency:
  group: changesets-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Version + publish (PR-less)
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}
    permissions:
      contents: write
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so changeset version diffs correctly

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Version + publish if changesets are pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          set -euo pipefail
          # `release:version` = changeset version (+ sync-desktop-version.mjs).
          # No pending changesets ⇒ no file changes ⇒ we skip the publish.
          pnpm release:version
          if [ -z "$(git status --porcelain)" ]; then
            echo "No pending changesets — nothing to version or publish."
            exit 0
          fi
          git add -A
          git commit -m "chore(release): version packages"
          git push origin HEAD:main
          # changeset publish is idempotent: it skips versions already on npm.
          pnpm release:publish
