name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Runners: Blacksmith-hosted, matching reddb-io/reddb's setup.
# 8vcpu for the heavy Rust+webview Tauri builds; 4vcpu elsewhere.
#
# Signing secrets (all optional — the workflow falls back to unsigned
# builds when a secret is missing):
#   TAURI_SIGNING_PRIVATE_KEY    — Tauri updater signing key (for autoUpdate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   APPLE_CERTIFICATE             — base64-encoded .p12 (Developer ID Application)
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_SIGNING_IDENTITY        — e.g. "Developer ID Application: …"
#   APPLE_ID                      — Apple ID for notarization
#   APPLE_PASSWORD                — app-specific password
#   APPLE_TEAM_ID
#   WINDOWS_CERTIFICATE           — base64-encoded .pfx
#   WINDOWS_CERTIFICATE_PASSWORD

# Never interrupt an in-flight release (a half-published tag is worse than a
# queued one), but don't run two releases for the same ref at once.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# npm publishing lives in changesets.yml (publishes on the Version Packages PR
# merge, github-hosted for provenance). release.yml is now binaries-only:
# tauri + pwa, triggered by a manually-pushed v* tag when you want a desktop/PWA
# release. This keeps npm with exactly one publisher (no double-publish).
jobs:
  tauri:
    name: tauri · ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # macOS and Windows builds are intentionally commented out until
        # the Linux pipeline is green end-to-end. Uncomment to restore.
        include:
          - platform: blacksmith-8vcpu-ubuntu-2404
            args: ""
          # - platform: blacksmith-6vcpu-macos-15
          #   args: '--target universal-apple-darwin'
          # - platform: blacksmith-8vcpu-windows-2025
          #   args: ''

    runs-on: ${{ matrix.platform }}
    env:
      RED_BUILD_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
      RED_BUILD_GIT_SHA: ${{ github.sha }}
      # sccache object-cache (CARGO_INCREMENTAL must be 0 — incremental and
      # sccache are mutually exclusive). Harvested from reddb-io/reddb.
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install mold (linux link speedup)
        if: contains(matrix.platform, 'ubuntu')
        uses: rui314/setup-mold@v1

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          # Same key as ci.yml's tauri job so the release build warm-starts
          # from CI's cache.
          shared-key: tauri-${{ runner.os }}-rust-1.95.0
          cache-on-failure: "true"

      - name: linux deps
        if: contains(matrix.platform, 'ubuntu')
        uses: ./.github/actions/tauri-linux-deps

      - run: pnpm install --frozen-lockfile

      # Build the SvelteKit bundle explicitly here, before tauri-action
      # invokes its own beforeBuildCommand. The first attempt failed
      # because tauri-action's path resolution didn't pick up the
      # bundle that beforeBuildCommand had just written (likely a
      # working-directory mismatch in the monorepo). Building once
      # ahead of time guarantees `packages/ui/build` exists when
      # tauri-action validates `frontendDist`.
      - name: build frontend (pwa bundle for embedding)
        run: pnpm --filter @reddb-io/ui build

      - name: verify frontend bundle
        run: ls -la packages/ui/build/ && test -f packages/ui/build/index.html

      # Provision the `red` sidecar (Tauri externalBin) — gitignored, not
      # committed. Must exist before tauri-action bundles the app.
      - name: provision red sidecar
        run: |
          curl -fsSL https://raw.githubusercontent.com/reddb-io/reddb/main/install.sh | bash
          bash scripts/sync-desktop-sidecar.sh "$HOME/.local/bin/red"

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — empty values are tolerated by
          # tauri-action and produce unsigned builds (no autoUpdate).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "red-ui ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  pwa-build:
    name: pwa · build + zip
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    env:
      RED_BUILD_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
      RED_BUILD_GIT_SHA: ${{ github.sha }}
    outputs:
      zip-name: ${{ steps.pack.outputs.zip-name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      # The "root" build is for the `red` binary to embed (BASE_PATH=''),
      # while the Pages build deploys under /red-ui (BASE_PATH=/red-ui).
      # We build both so the release ships an embeddable bundle AND
      # Pages always reflects the latest tag.
      - name: build pwa (root, for embedding)
        env:
          BASE_PATH: ""
        run: pnpm --filter @reddb-io/ui build

      - name: pack zip
        id: pack
        run: |
          name="red-ui-${{ github.ref_name }}-web.zip"
          (cd packages/ui/build && zip -r -q "$GITHUB_WORKSPACE/$name" .)
          echo "zip-name=$name" >> "$GITHUB_OUTPUT"

      # Attach the zipped bundle to the draft release the tauri matrix
      # opened (or create it if matrix hasn't run yet). softprops/action-gh-release
      # appends without overwriting.
      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.zip-name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          name: "red-ui ${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pwa-bundle
          path: packages/ui/build

  # GitHub Pages deployment for https://ui.reddb.io is handled by
  # .github/workflows/pages.yml on pushes to main.
