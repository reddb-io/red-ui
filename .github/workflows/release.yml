name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Runners: Blacksmith-hosted, matching reddb-io/reddb's setup.
# 8vcpu for the heavy Rust+webview Tauri builds; 4vcpu elsewhere.
#
# Signing secrets (all optional — the workflow falls back to unsigned
# builds when a secret is missing):
#   TAURI_SIGNING_PRIVATE_KEY    — Tauri updater signing key (for autoUpdate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   APPLE_CERTIFICATE             — base64-encoded .p12 (Developer ID Application)
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_SIGNING_IDENTITY        — e.g. "Developer ID Application: …"
#   APPLE_ID                      — Apple ID for notarization
#   APPLE_PASSWORD                — app-specific password
#   APPLE_TEAM_ID
#   WINDOWS_CERTIFICATE           — base64-encoded .pfx
#   WINDOWS_CERTIFICATE_PASSWORD

jobs:
  tauri:
    name: tauri · ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # macOS and Windows builds are intentionally commented out until
        # the Linux pipeline is green end-to-end. Uncomment to restore.
        include:
          - platform: blacksmith-8vcpu-ubuntu-2404
            args: ''
          # - platform: blacksmith-6vcpu-macos-15
          #   args: '--target universal-apple-darwin'
          # - platform: blacksmith-8vcpu-windows-2025
          #   args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: linux deps
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - run: pnpm install --frozen-lockfile

      # Build the SvelteKit bundle explicitly here, before tauri-action
      # invokes its own beforeBuildCommand. The first attempt failed
      # because tauri-action's path resolution didn't pick up the
      # bundle that beforeBuildCommand had just written (likely a
      # working-directory mismatch in the monorepo). Building once
      # ahead of time guarantees `packages/ui/build` exists when
      # tauri-action validates `frontendDist`.
      - name: build frontend (pwa bundle for embedding)
        run: pnpm --filter @red-ui/ui build

      - name: verify frontend bundle
        run: ls -la packages/ui/build/ && test -f packages/ui/build/index.html

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — empty values are tolerated by
          # tauri-action and produce unsigned builds (no autoUpdate).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'red-ui ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  pwa-build:
    name: pwa · build + zip
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    outputs:
      zip-name: ${{ steps.pack.outputs.zip-name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      # The "root" build is for the `red` binary to embed (BASE_PATH=''),
      # while the Pages build deploys under /red-ui (BASE_PATH=/red-ui).
      # We build both so the release ships an embeddable bundle AND
      # Pages always reflects the latest tag.
      - name: build pwa (root, for embedding)
        env:
          BASE_PATH: ''
        run: pnpm --filter @red-ui/ui build

      - name: pack zip
        id: pack
        run: |
          name="red-ui-${{ github.ref_name }}-web.zip"
          (cd packages/ui/build && zip -r -q "$GITHUB_WORKSPACE/$name" .)
          echo "zip-name=$name" >> "$GITHUB_OUTPUT"

      # Attach the zipped bundle to the draft release the tauri matrix
      # opened (or create it if matrix hasn't run yet). softprops/action-gh-release
      # appends without overwriting.
      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.zip-name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          name: 'red-ui ${{ github.ref_name }}'

      - uses: actions/upload-artifact@v4
        with:
          name: pwa-bundle
          path: packages/ui/build

  # Deploy the Web Surface to Cloudflare Pages → ui.reddb.io (ADR-0005).
  # Built with BASE_PATH='' because this is a dedicated host, not a subpath.
  # The deploy step self-skips when CLOUDFLARE_* secrets are absent, mirroring
  # the unsigned-build fallback in the tauri job, so forks/PRs don't fail.
  #
  # Required repo secrets:
  #   CLOUDFLARE_API_TOKEN   — scoped token with "Cloudflare Pages: Edit"
  #   CLOUDFLARE_ACCOUNT_ID  — the reddb.io Cloudflare account id
  # The ui.reddb.io custom domain / DNS binding is owned by rio-infra.
  pwa-pages:
    name: pwa · cloudflare pages
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: build pwa (root, for ui.reddb.io)
        env:
          BASE_PATH: ''
        run: pnpm --filter @red-ui/ui build

      - name: deploy to cloudflare pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy packages/ui/build
            --project-name=red-ui
            --branch=main
            --commit-hash=${{ github.sha }}
