# red-ui local dev cluster
#
#   docker compose -f docker/compose.yml up -d
#   ./scripts/seed.sh http://localhost:18080
#
# Primary  → http://localhost:18080  (grpc :15051)
# Replica  → http://localhost:18081  (grpc :15052, read-only mirror)
#
# Stripped-down: no vault, no certs — local-only credentials.
# For production, see reddb/examples/docker-compose.vault.yml.

services:
  primary:
    image: ghcr.io/reddb-io/reddb:1.3.0
    container_name: red-ui-primary
    ports:
      - "18080:8080"
      - "15051:50051"
    volumes:
      - primary-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      RED_HTTP_TLS_DEV: "1"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/red status --bind 127.0.0.1:8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 8s

  replica:
    image: ghcr.io/reddb-io/reddb:1.3.0
    container_name: red-ui-replica
    ports:
      - "18081:8080"
      - "15052:50051"
    volumes:
      - replica-data:/data
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      RED_HTTP_TLS_DEV: "1"
      REDDB_PRIMARY_ADDR: http://primary:50051
    depends_on:
      primary:
        condition: service_started

volumes:
  primary-data:
  replica-data:
