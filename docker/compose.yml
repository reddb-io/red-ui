# red-ui local dev cluster
#
#   docker compose -f docker/compose.yml up -d
#   ./scripts/seed.sh http://localhost:15055
#
# Host ports offset because canonical 5050/5055/5555 may be in use
# (e.g. flyctl proxy to prod). Inside containers we use canonical ports.
#
#   Primary  →  host 15050 (wire) · 15055 (http) · 15555 (grpc)
#   Replica  →  host 25050 (wire) · 25055 (http) · 25555 (grpc)
#
# For production, see reddb/examples/docker-compose.vault.yml.

services:
  primary:
    image: ghcr.io/reddb-io/reddb:1.9.1
    container_name: red-ui-primary
    ports:
      - "15050:5050"
      - "15055:5055"
      - "15555:5555"
    volumes:
      - primary-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:5555"
      - "--http-bind"
      - "0.0.0.0:5055"
    environment:
      RUST_LOG: info
      RED_HTTP_TLS_DEV: "1"

  replica:
    image: ghcr.io/reddb-io/reddb:1.9.1
    container_name: red-ui-replica
    ports:
      - "25050:5050"
      - "25055:5055"
      - "25555:5555"
    volumes:
      - replica-data:/data
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:5555"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:5555"
      - "--http-bind"
      - "0.0.0.0:5055"
    environment:
      RUST_LOG: info
      RED_HTTP_TLS_DEV: "1"
      REDDB_PRIMARY_ADDR: http://primary:5555
    depends_on:
      primary:
        condition: service_started

volumes:
  primary-data:
  replica-data:
